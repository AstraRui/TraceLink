worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Docker's embedded DNS. Combined with variables in proxy_pass below, this
    # makes nginx re-resolve service names at request time, so container
    # restarts (which change IPs) never leave routing pointing at a stale IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Trace id for end-to-end logging: reuse a client-supplied X-Request-ID if
    # present, otherwise generate one. Forwarded to every upstream below.
    map $http_x_request_id $trace_id {
        default   $request_id;
        "~."      $http_x_request_id;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $trace_id;

        set $admin    "admin-panel:8000";
        set $redirect "redirect-service:8000";
        set $stats    "stats-service:8000";

        # ── Reserved words (6–8 chars) that must not be read as short codes ──
        location = /logout { proxy_pass http://$admin; }
        location = /health { proxy_pass http://$admin; }
        location = /login  { proxy_pass http://$admin; }

        # ── Admin areas: static assets, htmx fragments, link management ──
        location /static/   { proxy_pass http://$admin; }
        location /partials/ { proxy_pass http://$admin; }
        location = /links   { proxy_pass http://$admin; }
        location /links/    { proxy_pass http://$admin; }

        # ── Swagger UI / OpenAPI for each service. Each app serves its docs at
        #    these exact prefixed paths (docs_url/openapi_url), so we proxy
        #    them through unchanged — no rewrite, no path overlap. ──
        location = /api/redirect/docs         { proxy_pass http://$redirect; }
        location = /api/redirect/openapi.json { proxy_pass http://$redirect; }
        location = /api/stats/docs            { proxy_pass http://$stats; }
        location = /api/stats/openapi.json    { proxy_pass http://$stats; }

        # ── Public short links: a single url-safe segment of 6–8 chars ──
        location ~ "^/[A-Za-z0-9_-]{6,8}$" {
            proxy_pass http://$redirect;
        }

        # ── Everything else → admin panel ──
        location / {
            proxy_pass http://$admin;
        }
    }
}
