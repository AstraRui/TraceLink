{% extends "base.html" %}
{% block title %}System Logs{% endblock %}
{% block body %}
<div class="max-w-6xl mx-auto px-4 py-8">
  <header class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold">📜 System Logs</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm">End-to-end trace across all services</p>
    </div>
    <div class="flex items-center gap-2">
      <a href="/" class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2 text-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition">← Dashboard</a>
      <button type="button" data-theme-toggle aria-label="Toggle dark mode"
        class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition">
        <svg class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.36 6.36l-.7-.7M6.34 6.34l-.7-.7m12.72 0l-.7.7M6.34 17.66l-.7.7M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      </button>
    </div>
  </header>

  <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-5">
    <form id="log-filters" hx-get="/partials/logs" hx-target="#logs-list" hx-swap="innerHTML"
      hx-trigger="change, every 5s" class="flex flex-wrap items-center gap-3 mb-4">
      <label class="text-sm text-slate-500 dark:text-slate-400">Service</label>
      <select name="service" class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm px-3 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="all" {{ 'selected' if service == 'all' }}>All</option>
        <option value="admin" {{ 'selected' if service == 'admin' }}>Admin</option>
        <option value="redirect" {{ 'selected' if service == 'redirect' }}>Redirect</option>
        <option value="stats" {{ 'selected' if service == 'stats' }}>Stats</option>
      </select>
      <label class="text-sm text-slate-500 dark:text-slate-400 ml-2">Level</label>
      <select name="level" class="rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm px-3 py-1.5 outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="all" {{ 'selected' if level == 'all' }}>All</option>
        <option value="INFO" {{ 'selected' if level == 'INFO' }}>INFO</option>
        <option value="WARNING" {{ 'selected' if level == 'WARNING' }}>WARNING</option>
        <option value="ERROR" {{ 'selected' if level == 'ERROR' }}>ERROR</option>
      </select>
      <span class="ml-auto text-xs text-slate-400 dark:text-slate-500">auto-refresh · 5s</span>
    </form>

    <div class="overflow-x-auto">
      <div id="logs-list">
        {% include "partials/logs_rows.html" %}
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Copy the full trace id to the clipboard (works on freshly swapped rows too).
  document.addEventListener("click", function (e) {
    var btn = e.target.closest("[data-trace]");
    if (!btn) return;
    var trace = btn.getAttribute("data-trace");
    navigator.clipboard.writeText(trace).then(function () {
      var original = btn.textContent;
      btn.textContent = "copied!";
      setTimeout(function () { btn.textContent = original; }, 1000);
    });
  });
</script>
{% endblock %}
